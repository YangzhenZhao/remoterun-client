services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-remoterun}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-remoterun}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: golang:1.24-alpine
    working_dir: /workspace/backend
    command: >
      sh -c "go mod download && go run ./cmd/server"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ADDR: :8080
      ALLOWED_ORIGIN: http://localhost:5173
      COOKIE_SECURE: "false"
      GOPROXY: https://goproxy.cn,direct
      DATA_DIR: /workspace/data
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-remoterun}?sslmode=disable
      SESSION_NAME: ${SESSION_NAME:-remoterun_session}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-2160h}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret-please-32chars}
      UPSTREAM_TIMEOUT: 60s
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-password}
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace

  frontend:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - frontend-node-modules:/workspace/node_modules

volumes:
  postgres-dev-data:
  frontend-node-modules:
